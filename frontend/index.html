<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DRISHTI – Calamity Aware Route Safety</title>
  <meta name="description" content="DRISHTI is a disaster-aware navigation system providing real-time calamity analysis, safe routing, and crowd-sourced incident reports." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ========== TOAST CONTAINER ========== -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- ========== AUTH PAGE ========== -->
  <section id="authPage" class="auth-page">
    <div class="auth-bg-shapes">
      <div class="shape shape-1"></div>
      <div class="shape shape-2"></div>
      <div class="shape shape-3"></div>
    </div>

    <div class="auth-card">
      <div class="auth-header">
        <div class="auth-logo">
          <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="18" stroke="url(#grad1)" stroke-width="3" fill="none"/>
            <path d="M20 8 L20 32 M12 16 L20 8 L28 16" stroke="url(#grad1)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
            <circle cx="20" cy="26" r="3" fill="url(#grad1)"/>
            <defs>
              <linearGradient id="grad1" x1="0" y1="0" x2="40" y2="40">
                <stop offset="0%" stop-color="#6366f1"/>
                <stop offset="100%" stop-color="#8b5cf6"/>
              </linearGradient>
            </defs>
          </svg>
        </div>
        <h1 class="auth-title">DRISHTI</h1>
        <p class="auth-subtitle">Calamity-Aware Route Safety System</p>
      </div>

      <div class="tabs">
        <button id="loginTab" class="tab-btn active" onclick="showLogin()">Login</button>
        <button id="signupTab" class="tab-btn" onclick="showSignup()">Sign Up</button>
        <div class="tab-indicator" id="tabIndicator"></div>
      </div>

      <div id="loginForm" class="auth-form">
        <div class="input-group">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input id="loginEmail" type="email" placeholder="Email address" />
        </div>
        <div class="input-group">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="loginPassword" type="password" placeholder="Password" />
          <button class="password-toggle" onclick="togglePassword('loginPassword', this)" type="button" aria-label="Toggle password visibility">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <button id="loginBtn" class="primary-btn" onclick="login()">
          <span>Sign In</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
        </button>
      </div>

      <div id="signupForm" class="auth-form hidden">
        <div class="input-group">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <input id="signupEmail" type="email" placeholder="Email address" />
        </div>
        <div class="input-group">
          <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input id="signupPassword" type="password" placeholder="Password" />
          <button class="password-toggle" onclick="togglePassword('signupPassword', this)" type="button" aria-label="Toggle password visibility">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <button id="signupBtn" class="primary-btn" onclick="signup()">
          <span>Create Account</span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" x2="19" y1="8" y2="14"/><line x1="22" x2="16" y1="11" y2="11"/></svg>
        </button>
      </div>
    </div>
  </section>

  <!-- ========== MAIN APP ========== -->
  <section id="appPage" class="app-page hidden">

    <!-- NAVBAR -->
    <nav class="navbar">
      <div class="navbar-brand">
        <svg width="28" height="28" viewBox="0 0 40 40" fill="none">
          <circle cx="20" cy="20" r="18" stroke="url(#grad2)" stroke-width="3" fill="none"/>
          <path d="M20 8 L20 32 M12 16 L20 8 L28 16" stroke="url(#grad2)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <circle cx="20" cy="26" r="3" fill="url(#grad2)"/>
          <defs>
            <linearGradient id="grad2" x1="0" y1="0" x2="40" y2="40">
              <stop offset="0%" stop-color="#6366f1"/>
              <stop offset="100%" stop-color="#8b5cf6"/>
            </linearGradient>
          </defs>
        </svg>
        <span class="navbar-title">DRISHTI</span>
      </div>

      <div class="navbar-actions">
        <div class="user-info">
          <div class="user-avatar" id="userAvatar">U</div>
          <span class="user-email" id="userLabel"></span>
        </div>

        <button class="icon-btn" id="darkModeToggle" onclick="toggleDarkMode()" title="Toggle dark mode" aria-label="Toggle dark mode">
          <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
          <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        </button>

        <button class="btn-logout" onclick="logout()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
          <span>Logout</span>
        </button>
      </div>
    </nav>

    <!-- DASHBOARD -->
    <div class="dashboard">

      <!-- LEFT: CONTROLS -->
      <aside class="controls-panel">

        <!-- Mode Indicator -->
        <div class="mode-indicator" id="modeIndicator">
          <div class="mode-dot"></div>
          <span id="modeText">Calamity Mode</span>
        </div>

        <!-- Report Input -->
        <div class="panel-card">
          <h3 class="panel-card-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
            Calamity Report
          </h3>
          <textarea id="report" placeholder="Describe the calamity situation (e.g., Heavy flooding on highway, building collapsed near market)..." rows="4"></textarea>
        </div>

        <!-- Parameters -->
        <div class="panel-card">
          <h3 class="panel-card-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            Parameters
          </h3>
          <div class="input-row">
            <div class="input-field">
              <label for="distance">Distance (km)</label>
              <input type="number" id="distance" placeholder="0.0" />
            </div>
            <div class="input-field">
              <label for="time">Time (min)</label>
              <input type="number" id="time" placeholder="0" />
            </div>
          </div>
        </div>

        <!-- Action Buttons -->
        <div class="panel-card">
          <h3 class="panel-card-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
            Actions
          </h3>
          <div class="btn-grid">
            <button class="action-btn action-btn-primary" onclick="analyze()" id="btnAnalyze">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              Analyze Safety
            </button>
            <button class="action-btn action-btn-secondary" onclick="analyzeRoute()" id="btnRoute">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
              Analyze Route
            </button>
            <button class="action-btn action-btn-outline" onclick="setMode('calamity')" id="btnSetCalamity">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>
              Set Calamity
            </button>
            <button class="action-btn action-btn-outline" onclick="setMode('route')" id="btnSetRoute">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 7 17l-5-5"/><path d="m22 10-7.5 7.5L13 16"/></svg>
              Set Route
            </button>
          </div>
        </div>

        <!-- Result Card -->
        <div class="panel-card result-card hidden" id="resultCard">
          <h3 class="panel-card-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
            Analysis Result
          </h3>
          <div class="result-grid">
            <div class="result-item">
              <span class="result-label">Calamity</span>
              <span class="result-value" id="resultCalamity">—</span>
            </div>
            <div class="result-item">
              <span class="result-label">Risk Level</span>
              <span class="result-value" id="resultRisk">—</span>
            </div>
            <div class="result-item">
              <span class="result-label">Confidence</span>
              <span class="result-value" id="resultConfidence">—</span>
            </div>
            <div class="result-item">
              <span class="result-label">Radius</span>
              <span class="result-value" id="resultRadius">—</span>
            </div>
          </div>
          <div class="result-status" id="resultStatus"></div>
        </div>

        <!-- Recent Reports -->
        <div class="panel-card">
          <h3 class="panel-card-title">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
            Recent Crowd Reports
          </h3>
          <div class="reports-list" id="reportsList">
            <p class="empty-state">No reports yet</p>
          </div>
        </div>
      </aside>

      <!-- RIGHT: MAP -->
      <div class="map-container">
        <!-- Loading Overlay -->
        <div class="loading-overlay hidden" id="loadingOverlay">
          <div class="spinner"></div>
          <span class="loading-text">Analyzing...</span>
        </div>

        <div id="map"></div>

        <!-- Map Legend -->
        <div class="map-legend">
          <div class="legend-title">Zone Status</div>
          <div class="legend-item">
            <span class="legend-dot legend-safe"></span>Safe
          </div>
          <div class="legend-item">
            <span class="legend-dot legend-caution"></span>Caution
          </div>
          <div class="legend-item">
            <span class="legend-dot legend-blocked"></span>Blocked
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
  <script src="script.js"></script>
</body>
</html>
